apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cabure.fullname" . }}
  namespace: {{ include "cabure.namespace" . }}
  labels:
    {{- include "cabure.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "cabure.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cabure.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cabure.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cabure
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --leader-elect={{ ternary "true" "false" .Values.leaderElection.enabled }}
            - --watch-namespace={{ .Values.operator.watchNamespace }}
            - --concurrent-reconciles={{ .Values.operator.concurrentReconciles }}
            - --minimum-requeue-interval={{ .Values.operator.minimumRequeueInterval }}
            - --allow-cluster-scoped-resources={{ ternary "true" "false" .Values.operator.allowClusterScopedResources }}
            - --allowed-repository-prefixes={{ join "," .Values.operator.allowedRepositoryPrefixes }}
            - --field-manager={{ .Values.operator.fieldManager }}
            - --cache-dir={{ .Values.operator.cacheDir }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            failureThreshold: 30
            periodSeconds: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          {{- if .Values.cache.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "cabure.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
