{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cabure.fullname" . }}
  namespace: {{ include "cabure.namespace" . }}
  labels:
    {{- include "cabure.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "cabure.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: 30s
{{- end }}
